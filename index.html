<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anniversary 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  font-family:'Dancing Script',cursive;
  background:linear-gradient(135deg,#020617,#1e3a8a,#2563eb);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.card{
  width:90%;
  max-width:450px;
  height:600px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  position:relative;
  overflow:hidden;
}

/* SLIDE */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  text-align:center;
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
}

.slide.active{
  opacity:1;
  pointer-events:auto;
}

/* MEDIA FIX */
img,video{
  width:90%;
  max-width:340px;
  max-height:55vh;
  object-fit:contain;
  border-radius:15px;
  margin:10px 0;
}

/* PIN */
.pin-box input{
  width:50px;
  height:60px;
  font-size:28px;
  text-align:center;
  border-radius:10px;
  border:2px solid #60a5fa;
  margin:5px;
}

.keyboard button{
  width:60px;
  height:60px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:20px;
}

/* NAV BUTTON */
.nav{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#3b82f6;
  color:white;
  font-size:14px;
}

/* SURAT */
.envelope{
  width:300px;
  height:180px;
  background:#1e3a8a;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.flap{
  position:absolute;
  top:0;
  width:100%;
  height:70px;
  background:#3b82f6;
  transform-origin:top;
  transition:0.6s;
}

.paper{
  position:absolute;
  bottom:-100%;
  left:5%;
  width:90%;
  height:85%;
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  font-size:15px;
  overflow-y:auto;
  transition:0.8s ease;
  white-space:pre-wrap;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.envelope.open .paper{
  bottom:5%;
}
</style>
</head>

<body>

<div class="card">

<!-- PIN -->
<div class="slide active" id="s1">
<h1>Masukkan PIN 💙</h1>

<div class="pin-box">
<input maxlength="1"><input maxlength="1"><input maxlength="1"><input maxlength="1">
</div>

<div class="keyboard">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button><br>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button><br>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button><br>
<button onclick="del()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="check()">✔</button>
</div>
</div>

<!-- S2 -->
<div class="slide" id="s2">
<h1>Happy Anniversary 💙</h1>
<p>1 Tahun Bersama Kamu</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S3 FOTO -->
<div class="slide" id="s3">
<img src="foto1.jpg">
<p>Date Pizza yang Seruuu banget 🥰</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S4 FOTO -->
<div class="slide" id="s4">
<img src="foto2.jpg">
<p>waktu ngebantuin kamu 💙</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S5 FOTO -->
<div class="slide" id="s5">
<img src="foto3.jpg">
<p>lagiii jadi Koboy 🤠</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S6 VIDEO -->
<div class="slide" id="s6">
<video controls muted src="video1.mp4"></video>
<p>manusia tercantik</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S7 VIDEO -->
<div class="slide" id="s7">
<video controls muted src="video2.mp4"></video>
<p>I love the moment when i'm with you 💙</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- S8 -->
<div class="slide" id="s8">
<h1>Harapan Kita 💙</h1>
<p>Semoga selalu bersama</p>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
  <button class="btn" onclick="next()">Next ➡</button>
</div>
</div>

<!-- SURAT -->
<div class="slide" id="s9">
<h1>Buka Surat 💌</h1>

<div class="envelope" onclick="openLetter(this)">
  <div class="flap"></div>
  <div class="paper">
    <p id="text"></p>
  </div>
</div>

<div class="nav">
  <button class="btn" onclick="prev()">⬅ Back</button>
</div>
</div>

</div>

<script>

let current=1;

function show(n){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  current=n;
}

function next(){ if(current<9) show(current+1); }
function prev(){ if(current>1) show(current-1); }

/* PIN */
let i=0;
function press(n){
  let inputs=document.querySelectorAll('.pin-box input');
  if(i<inputs.length){
    inputs[i].value=n;
    i++;
  }
}
function del(){
  let inputs=document.querySelectorAll('.pin-box input');
  if(i>0){
    i--;
    inputs[i].value="";
  }
}
function check(){
  let val=[...document.querySelectorAll('.pin-box input')].map(x=>x.value).join('');
  if(val==="2306"){
    show(2);
  }else{
    alert("PIN salah!");
  }
}

/* SURAT + TYPING */
let opened=false;

const fullText = `Sayaanggf, happyyy anniversary yaaa yang pertama ✨💗, aku senang banget bisa ngelewatin semua nya bareng kamu selama 1 tahun ini, naik turun nya sebuah hubungan itu bener bener aku rasain banget dan bikin aku belajar banyak hal 🤩🤗, terimakasih banyak ya sayang karena udah selalu disamping aku 💙. Aku sayang dan cinta kamu ❤️. Salam hangat dari your BF.

Buat "sesuatu" nya ditunggu ya 🤭`;

function openLetter(el){
  if(opened) return;
  opened=true;

  el.classList.add("open");

  let target=document.getElementById("text");
  target.innerHTML="";

  let i=0;

  function type(){
    if(i<fullText.length){
      target.innerHTML+=fullText.charAt(i);
      i++;
      setTimeout(type,20);
    }
  }

  type();
}

</script>

</body>
</html>
